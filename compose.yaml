services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airbnb
      POSTGRES_USER: airbnb
      POSTGRES_PASSWORD: airbnb_local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airbnb -d airbnb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/airbnb
      PGUSER: airbnb
      PGPASSWORD: airbnb_local_password
      FRONTEND_URL: http://localhost:3000
      MANAGER_SIGNUP_CODE: local-manager
      JWT_SECRET_KEY: docker_local_secret_key_change_me_32_chars
      RAZORPAY_KEY_ID: rzp_test_placeholder
      RAZORPAY_KEY_SECRET: placeholder
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
