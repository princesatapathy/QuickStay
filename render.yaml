services:
  - type: web
    name: quickstay-api-princesatapathy
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: quickstay-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: quickstay-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: quickstay-db
          property: password
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MANAGER_SIGNUP_CODE
        generateValue: true
      - key: FRONTEND_URL
        value: https://quickstay-web-princesatapathy.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: web
    name: quickstay-web-princesatapathy
    runtime: static
    buildCommand: npm --prefix frontend ci && npm --prefix frontend run build
    staticPublishPath: ./frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://quickstay-api-princesatapathy.onrender.com/api/v1
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: quickstay-db
    plan: free
    databaseName: quickstay
    user: quickstay
