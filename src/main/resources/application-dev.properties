## Developer-friendly defaults

# JPA / SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator (handy locally too)
management.endpoints.web.exposure.include=health,info

# Razorpay (set real test keys locally through environment variables)
razorpay.API.key=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.API.secret=${RAZORPAY_KEY_SECRET:placeholder}
