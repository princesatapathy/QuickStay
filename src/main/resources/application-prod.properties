## Production-safe defaults

# DB - Render provides DATABASE_URL; Docker startup converts it to SPRING_DATASOURCE_URL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airbnb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Server port - Render injects PORT.
server.port=${PORT:8080}

# Frontend URL for CORS.
frontend.url=${FRONTEND_URL:https://quickstay-web-princesatapathy.onrender.com}

# JPA / SQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.org.hibernate.SQL=OFF

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
