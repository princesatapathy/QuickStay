## Production-safe defaults

# DB — Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# Alternatively set SPRING_DATASOURCE_URL directly
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:airbnb}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}

# Server port — Railway injects PORT
server.port=${PORT:8080}

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:https://your-app.vercel.app}

# JPA / SQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.org.hibernate.SQL=OFF

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

