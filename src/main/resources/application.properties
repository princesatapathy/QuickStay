spring.application.name=QuickStay

# Default profile (override with SPRING_PROFILES_ACTIVE)
spring.profiles.default=dev

# DB Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airbnb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Server Configuration
server.servlet.context-path=/api/v1
server.port=8080

# JWT Secret
jwt.secretKey=${JWT_SECRET_KEY:dev_secret_key_change_me_please_32_chars_min}

# Frontend URL
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Manager onboarding (blank disables public manager signup)
app.manager.signup.code=${MANAGER_SIGNUP_CODE:}

# Razorpay Configuration
razorpay.API.key=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.API.secret=${RAZORPAY_KEY_SECRET:placeholder}

# Swagger Configuration
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
